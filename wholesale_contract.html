<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增合同</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        function ContractForm() {
            const [activeTab, setActiveTab] = useState('daily'); // 'monthly', 'daily', 'hourly'
            const [showUploadModal, setShowUploadModal] = useState(false);
            // 表单状态
            const [formData, setFormData] = useState({
                province: '湖北省',
                aggregator: '售电公司',
                contractNumber: '111',
                contractType: '电能量合同',
                tradingVariety: '年度双边协商交易',
                transactionMethod: '买入',
                counterparty: '批发客户-湖北',
                tradingCycle: '年度',
                contractQuantity: '0.000',
                startDate: '2026-01-01',
                endDate: '2026-12-31',
                priceType: '统一电价',
                channel: '湖北渠道商'
            });
            const [selectedMonth, setSelectedMonth] = useState('2026-04');
            const [selectedDate, setSelectedDate] = useState('2026-04-16');

            // 模拟数据
            const monthlyMockData = Array.from({ length: 12 }, (_, i) => ({
                month: `${i + 1}月`,
                electricity: i === 3 ? 1200 : 0, // 4月有电量
                price: i === 3 ? 420 : 0          // 4月有电价
            }));

            const dailyMockData = Array.from({ length: 30 }, (_, i) => ({
                date: `04/${String(i + 1).padStart(2, '0')}`,
                electricity: 100,
                price: 350
            }));

            const hourlyMockData = Array.from({ length: 24 }, (_, i) => ({
                time: `${String(i).padStart(2, '0')}:00`,
                electricity: (Math.random() * 3 + 1).toFixed(3), // 1-4 之间
                price: (Math.random() * 50 + 330).toFixed(2)      // 330-380 之间
            }));
            // 渲染图表区域
            const renderChart = () => {
                const chartHeight = 220;
                const chartWidth = 1000;
                const padding = { top: 40, right: 50, bottom: 40, left: 50 };

                const getChartConfig = () => {
                    if (activeTab === 'monthly') return { maxElectricity: 1500, maxPrice: 500, data: monthlyMockData, xLabel: 'month' };
                    if (activeTab === 'daily') return { maxElectricity: 150, maxPrice: 500, data: dailyMockData, xLabel: 'date' };
                    return { maxElectricity: 5, maxPrice: 500, data: hourlyMockData, xLabel: 'time' };
                };

                const config = getChartConfig();
                const totalX = config.data.length;
                const usableWidth = chartWidth - padding.left - padding.right;

                return (
                    <div className="w-full border bg-gray-50 rounded p-4 mb-4">
                        <div className="relative" style={{ height: '320px' }}>
                            {/* 单位显示 */}
                            <div className="absolute left-0 -top-6 text-xs text-gray-500 font-medium whitespace-nowrap">电量 (MWh)</div>
                            <div className="absolute right-0 -top-6 text-xs text-gray-500 font-medium text-right whitespace-nowrap">电价 (元/MWh)</div>
                            
                            <svg viewBox={`0 0 ${chartWidth} ${chartHeight + padding.top + padding.bottom}`} className="w-full h-full" preserveAspectRatio="none">
                                {/* 背景网格线与Y轴刻度 */}
                                {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
                                    <g key={`y-grid-${i}`}>
                                        <line 
                                            x1={padding.left} 
                                            y1={padding.top + chartHeight * (1 - p)} 
                                            x2={chartWidth - padding.right} 
                                            y2={padding.top + chartHeight * (1 - p)} 
                                            stroke="#e5e7eb" 
                                            strokeWidth="1" 
                                            strokeDasharray="4,4" 
                                        />
                                        <text 
                                            x={padding.left - 10} 
                                            y={padding.top + chartHeight * (1 - p) + 4} 
                                            textAnchor="end" 
                                            fontSize="12" 
                                            fill="#9ca3af"
                                        >
                                            {(config.maxElectricity * p).toFixed(0)}
                                        </text>
                                        <text 
                                            x={chartWidth - padding.right + 10} 
                                            y={padding.top + chartHeight * (1 - p) + 4} 
                                            textAnchor="start" 
                                            fontSize="12" 
                                            fill="#9ca3af"
                                        >
                                            {(config.maxPrice * p).toFixed(0)}
                                        </text>
                                    </g>
                                ))}

                                {/* X轴基线 */}
                                <line 
                                    x1={padding.left} 
                                    y1={padding.top + chartHeight} 
                                    x2={chartWidth - padding.right} 
                                    y2={padding.top + chartHeight} 
                                    stroke="#d1d5db" 
                                    strokeWidth="1" 
                                />
                                
                                {/* 柱状图 (电量) */}
                                {config.data.map((d, i) => {
                                    const slotWidth = usableWidth / totalX;
                                    const barWidth = slotWidth * 0.7; // 增加宽度
                                    const x = padding.left + (i * slotWidth) + (slotWidth - barWidth) / 2;
                                    const h = (d.electricity / config.maxElectricity) * chartHeight;
                                    return (
                                        <rect
                                            key={`bar-${i}`}
                                            x={x}
                                            y={padding.top + chartHeight - h}
                                            width={barWidth}
                                            height={h}
                                            fill="#3b82f6"
                                            fillOpacity="0.85"
                                            rx="1"
                                        />
                                    );
                                })}

                                {/* 折线图 (电价) */}
                                <path
                                    d={config.data.map((d, i) => {
                                        const slotWidth = usableWidth / totalX;
                                        const x = padding.left + (i * slotWidth) + (slotWidth / 2);
                                        const y = padding.top + chartHeight * (1 - d.price / config.maxPrice);
                                        return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
                                    }).join(' ')}
                                    fill="none"
                                    stroke="#10b981"
                                    strokeWidth="2.5"
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                />
                                
                                {/* 折线图上的点 */}
                                {config.data.map((d, i) => {
                                    const slotWidth = usableWidth / totalX;
                                    const x = padding.left + (i * slotWidth) + (slotWidth / 2);
                                    const y = padding.top + chartHeight * (1 - d.price / config.maxPrice);
                                    return (
                                        <circle
                                            key={`dot-${i}`}
                                            cx={x}
                                            cy={y}
                                            r="3.5"
                                            fill="white"
                                            stroke="#10b981"
                                            strokeWidth="2"
                                        />
                                    );
                                })}

                                {/* X轴标签 */}
                                {config.data.map((d, i) => {
                                    let showLabel = true;
                                    if (activeTab === 'daily' && i % 3 !== 0) showLabel = false;
                                    if (activeTab === 'hourly' && i % 4 !== 0) showLabel = false;
                                    if (!showLabel && i !== config.data.length - 1) return null;

                                    const slotWidth = usableWidth / totalX;
                                    const x = padding.left + (i * slotWidth) + (slotWidth / 2);
                                    return (
                                        <text
                                            key={`x-label-${i}`}
                                            x={x}
                                            y={padding.top + chartHeight + 25}
                                            textAnchor="middle"
                                            fontSize="11"
                                            fill="#6b7280"
                                        >
                                            {d[config.xLabel]}
                                        </text>
                                    );
                                })}
                            </svg>
                        </div>
                    </div>
                );
            };
            // 渲染数据表格
            const renderDataTable = () => {
                if (activeTab === 'monthly') {
                    const totalElectricity = monthlyMockData.reduce((sum, d) => sum + d.electricity, 0);
                    const avgPrice = totalElectricity > 0 ? (monthlyMockData.reduce((sum, d) => sum + d.electricity * d.price, 0) / totalElectricity).toFixed(2) : '0.00';
                    return (
                        <table className="w-full border-collapse border border-gray-300 text-sm">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="border border-gray-300 p-2 text-left">月份</th>
                                    {monthlyMockData.map(d => (
                                        <th key={d.month} className="border border-gray-300 p-2">{d.month}</th>
                                    ))}
                                    <th className="border border-gray-300 p-2">合计/加权价</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td className="border border-gray-300 p-2 font-medium">电量 (MWh)</td>
                                    {monthlyMockData.map((d, i) => (
                                        <td key={i} className="border border-gray-300 p-2 text-center">{d.electricity.toFixed(3)}</td>
                                    ))}
                                    <td className="border border-gray-300 p-2 text-center font-bold">{totalElectricity.toFixed(3)}</td>
                                </tr>
                                <tr>
                                    <td className="border border-gray-300 p-2 font-medium">电价 (元/MWh)</td>
                                    {monthlyMockData.map((d, i) => (
                                        <td key={i} className="border border-gray-300 p-2 text-center">{d.price.toFixed(2)}</td>
                                    ))}
                                    <td className="border border-gray-300 p-2 text-center font-bold">{avgPrice}</td>
                                </tr>
                            </tbody>
                        </table>
                    );
                } else if (activeTab === 'daily') {
                    const pageData = dailyMockData; 
                    return (
                        <div className="overflow-x-auto">
                            <table className="min-w-full border-collapse border border-gray-300 text-sm">
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="border border-gray-300 p-2 text-left sticky left-0 bg-gray-100 z-10">日期</th>
                                        {pageData.map(d => (
                                            <th key={d.date} className="border border-gray-300 p-2 min-w-[80px]">{d.date}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td className="border border-gray-300 p-2 font-medium sticky left-0 bg-white z-10">电量 (MWh)</td>
                                        {pageData.map((d, i) => (
                                            <td key={i} className="border border-gray-300 p-2 text-center">{d.electricity.toFixed(3)}</td>
                                        ))}
                                    </tr>
                                    <tr>
                                        <td className="border border-gray-300 p-2 font-medium sticky left-0 bg-white z-10">电价 (元/MWh)</td>
                                        {pageData.map((d, i) => (
                                            <td key={i} className="border border-gray-300 p-2 text-center">{d.price.toFixed(2)}</td>
                                        ))}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    );
                } else {
                    const pageData = hourlyMockData;
                    return (
                        <div className="overflow-x-auto">
                            <table className="min-w-full border-collapse border border-gray-300 text-sm">
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="border border-gray-300 p-2 text-left sticky left-0 bg-gray-100 z-10">时刻</th>
                                        {pageData.map(d => (
                                            <th key={d.time} className="border border-gray-300 p-2 min-w-[70px]">{d.time}</th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td className="border border-gray-300 p-2 font-medium sticky left-0 bg-white z-10">电量 (MWh)</td>
                                        {pageData.map((d, i) => (
                                            <td key={i} className="border border-gray-300 p-2 text-center">{d.electricity}</td>
                                        ))}
                                    </tr>
                                    <tr>
                                        <td className="border border-gray-300 p-2 font-medium sticky left-0 bg-white z-10">电价 (元/MWh)</td>
                                        {pageData.map((d, i) => (
                                            <td key={i} className="border border-gray-300 p-2 text-center">{d.price}</td>
                                        ))}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    );
                }
            };
            return (
                <div className="min-h-screen bg-white p-6">
                    {/* 头部 */}
                    <div className="flex items-center mb-6">
                        <i className="fas fa-chevron-left text-gray-600 mr-3 cursor-pointer"></i>
                        <h1 className="text-xl font-medium text-gray-900">新增合同</h1>
                    </div>
                    {/* 合同基本信息 */}
                    <div className="mb-8">
                        <h2 className="text-base font-medium text-gray-900 mb-4">合同基本信息</h2>
                        <button className="px-4 py-2 border border-blue-500 text-blue-500 rounded hover:bg-blue-50 mb-6">
                            上传附件
                        </button>
                        <div className="grid grid-cols-4 gap-6">
                            {/* 第一行 */}
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 调控省区</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.province}
                                    onChange={(e) => setFormData({ ...formData, province: e.target.value })}
                                >
                                    <option>湖北省</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 聚合主体</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.aggregator}
                                    onChange={(e) => setFormData({ ...formData, aggregator: e.target.value })}
                                >
                                    <option>售电公司</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 合同编号</label>
                                <input
                                    type="text"
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.contractNumber}
                                    onChange={(e) => setFormData({ ...formData, contractNumber: e.target.value })}
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 合同类型</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.contractType}
                                    onChange={(e) => setFormData({ ...formData, contractType: e.target.value })}
                                >
                                    <option>电能量合同</option>
                                </select>
                            </div>
                            {/* 第二行 */}
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 交易品种</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.tradingVariety}
                                    onChange={(e) => setFormData({ ...formData, tradingVariety: e.target.value })}
                                >
                                    <option>年度双边协商交易</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 成交方式</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.transactionMethod}
                                    onChange={(e) => setFormData({ ...formData, transactionMethod: e.target.value })}
                                >
                                    <option>买入</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm mb-1">对方名称</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.counterparty}
                                    onChange={(e) => setFormData({ ...formData, counterparty: e.target.value })}
                                >
                                    <option>批发客户-湖北</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm text-red-500 mb-1">* 交易周期</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.tradingCycle}
                                    onChange={(e) => setFormData({ ...formData, tradingCycle: e.target.value })}
                                >
                                    <option>年度</option>
                                </select>
                            </div>
                            {/* 第三行 */}
                            <div className="col-span-2">
                                <label className="block text-sm text-red-500 mb-1">* 合同周期</label>
                                <div className="flex items-center space-x-2">
                                    <input
                                        type="date"
                                        className="flex-1 border border-gray-300 rounded px-3 py-2"
                                        value={formData.startDate}
                                        onChange={(e) => setFormData({ ...formData, startDate: e.target.value })}
                                    />
                                    <span>→</span>
                                    <input
                                        type="date"
                                        className="flex-1 border border-gray-300 rounded px-3 py-2"
                                        value={formData.endDate}
                                        onChange={(e) => setFormData({ ...formData, endDate: e.target.value })}
                                    />
                                    <i className="far fa-calendar-alt text-gray-400"></i>
                                </div>
                            </div>
                            <div className="col-span-2">
                                <label className="block text-sm mb-1">渠道商</label>
                                <select
                                    className="w-full border border-gray-300 rounded px-3 py-2"
                                    value={formData.channel}
                                    onChange={(e) => setFormData({ ...formData, channel: e.target.value })}
                                >
                                    <option>湖北渠道商</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    {/* 合同量价导入模块 */}
                    <div className="mb-8">
                        <h2 className="text-base font-medium text-gray-900 mb-4">合同量价导入</h2>
                        <div className="flex space-x-3">
                            <button 
                                className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 shadow-sm flex items-center"
                                onClick={() => setShowUploadModal(true)}
                            >
                                <i className="fas fa-file-import mr-2"></i>
                                量价导入
                            </button>
                            <button 
                                className="px-4 py-2 border border-blue-500 text-blue-500 rounded hover:bg-blue-50 shadow-sm flex items-center"
                                onClick={() => alert('合约拆分计算已完成')}
                            >
                                <i className="fas fa-calculator mr-2"></i>
                                合约拆分计算
                            </button>
                        </div>
                    </div>
                    {/* 合同量价信息 */}
                    <div className="mb-8">
                        <h2 className="text-base font-medium text-gray-900 mb-4">合同量价信息</h2>
                        {/* Tab切换 */}
                        <div className="flex space-x-6 mb-6 border-b">
                            <button
                                className={`pb-2 ${activeTab === 'monthly' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-600'}`}
                                onClick={() => setActiveTab('monthly')}
                            >
                                分月
                            </button>
                            <button
                                className={`pb-2 ${activeTab === 'daily' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-600'}`}
                                onClick={() => setActiveTab('daily')}
                            >
                                分日
                            </button>
                            <button
                                className={`pb-2 ${activeTab === 'hourly' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-600'}`}
                                onClick={() => setActiveTab('hourly')}
                            >
                                分时
                            </button>
                        </div>
                        {/* 控制区域 */}
                        <div className="flex space-x-6 mb-4">
                            {activeTab === 'monthly' && (
                                <div>
                                    <label className="block text-sm mb-1">分月曲线</label>
                                    <select className="w-48 border border-gray-300 rounded px-3 py-2">
                                        <option>通用-湖北分月分解</option>
                                    </select>
                                </div>
                            )}
                            {activeTab === 'daily' && (
                                <>
                                    <div>
                                        <label className="block text-sm mb-1">分日曲线</label>
                                        <select className="w-48 border border-gray-300 rounded px-3 py-2">
                                            <option>通用-湖北分日分解</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-1">选择月份</label>
                                        <div className="flex space-x-2">
                                            <input
                                                type="month"
                                                className="w-48 border border-gray-300 rounded px-3 py-2"
                                                value={selectedMonth}
                                                onChange={(e) => setSelectedMonth(e.target.value)}
                                            />
                                            <i className="far fa-calendar-alt text-gray-400 self-center"></i>
                                        </div>
                                    </div>
                                </>
                            )}
                            {activeTab === 'hourly' && (
                                <div>
                                    <label className="block text-sm mb-1">选择日期</label>
                                    <div className="flex space-x-2">
                                        <input
                                            type="date"
                                            className="w-48 border border-gray-300 rounded px-3 py-2"
                                            value={selectedDate}
                                            onChange={(e) => setSelectedDate(e.target.value)}
                                        />
                                        <i className="far fa-calendar-alt text-gray-400 self-center"></i>
                                    </div>
                                </div>
                            )}
                        </div>
                        {/* 按钮组 */}
                        <div className="flex justify-end space-x-2 mb-4">
                            <button className="px-4 py-2 border border-gray-300 text-gray-700 rounded hover:bg-gray-50">
                                导出
                            </button>
                        </div>
                        {/* 图例 */}
                        <div className="flex items-center space-x-4 mb-4">
                            <div className="flex items-center">
                                <span className="w-3 h-3 bg-blue-500 rounded-sm mr-2"></span>
                                <span className="text-sm text-gray-700">电量</span>
                            </div>
                            <div className="flex items-center">
                                <span className="w-3 h-3 bg-green-500 rounded-sm mr-2"></span>
                                <span className="text-sm text-gray-700">电价</span>
                            </div>
                        </div>
                        {/* 图表 */}
                        {renderChart()}
                        {/* 数据表格 */}
                        <div className="mt-6 overflow-x-auto">
                            {renderDataTable()}
                        </div>
                    </div>
                    {/* 底部按钮 */}
                    <div className="flex justify-end space-x-4 pt-6 border-t">
                        <button className="px-6 py-2 border border-gray-300 text-gray-700 rounded hover:bg-gray-50">
                            取消
                        </button>
                        <button className="px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                            保存
                        </button>
                    </div>

                    {/* 上传弹窗 */}
                    {showUploadModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg w-1/3 p-6 shadow-lg">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-medium text-gray-900">量价导入</h3>
                                    <i className="fas fa-times text-gray-400 cursor-pointer hover:text-gray-600" onClick={() => setShowUploadModal(false)}></i>
                                </div>
                                
                                <div className="border-2 border-dashed border-gray-300 rounded p-8 flex flex-col items-center justify-center bg-gray-50 mb-4">
                                    <i className="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-3"></i>
                                    <div className="text-sm text-gray-600 mb-2">
                                        将文件拖到此处，或 <span className="text-blue-500 cursor-pointer hover:underline">点击上传</span>
                                    </div>
                                    <div className="text-xs text-gray-400">支持 Excel 格式文件</div>
                                </div>

                                <div className="flex justify-end space-x-3 mt-6">
                                    <button 
                                        className="px-4 py-2 border border-gray-300 text-gray-700 rounded hover:bg-gray-50"
                                        onClick={() => setShowUploadModal(false)}
                                    >
                                        取消
                                    </button>
                                    <button 
                                        className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                                        onClick={() => {
                                            alert('文件已成功导入');
                                            setShowUploadModal(false);
                                        }}
                                    >
                                        确认导入
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.render(<ContractForm />, document.getElementById('root'));
    </script>
</body>

</html>
