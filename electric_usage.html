												<tr className="hover:bg-gray-50">

													<td className="px-6 py-4 text-gray-600">RPA任务结束</td>

													<td className="px-6 py-4 text-center"><span className="text-green-700 bg-green-100 border border-green-200 px-2 py-1 rounded text-xs">成功</span></td>
												</tr>
											</tbody>
										</table>
										{/* 分页组件 */}
										<div className="flex justify-between items-center px-6 py-4 border-t border-gray-200 bg-gray-50">
											<div className="text-sm text-gray-500">共计 45 条记录</div>
											<div className="flex items-center space-x-1">
												<button className="px-2 py-1 border border-gray-300 rounded bg-white text-gray-500 hover:bg-gray-100 transition-colors">&lt;</button>
												<button className="px-3 py-1 bg-blue-500 text-white border border-blue-500 rounded">1</button>
												<button className="px-3 py-1 border border-transparent text-gray-700 hover:bg-gray-200 rounded transition-colors">2</button>
												<button className="px-3 py-1 border border-transparent text-gray-700 hover:bg-gray-200 rounded transition-colors">3</button>
												<span className="px-1 text-gray-400">...</span>
												<button className="px-3 py-1 border border-transparent text-gray-700 hover:bg-gray-200 rounded transition-colors">9</button>
												<button className="px-2 py-1 border border-gray-300 rounded bg-white text-gray-500 hover:bg-gray-100 transition-colors">&gt;</button>
											</div>
										</div>
									</div>
									<div className="modal-footer bg-white border-t border-gray-200">
										<button onClick={() => setShowImportLogModal(false)} className="px-5 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition-colors shadow-sm">关闭</button>
									</div>
								</div>
							</div>
						)}
					</div>
					
					{/* 浮窗提示 */}
					{floatMsg && (
						<div className="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black bg-opacity-60 shadow-xl text-white px-6 py-3 rounded-lg text-sm z-[1100] flex items-center space-x-2 transition-opacity duration-300">
							<i className="fas fa-info-circle"></i>
							<span>{floatMsg}</span>
						</div>
					)}
				</div>
			);
		}
		ReactDOM.render(<App />, document.getElementById('root'));
	</script>
